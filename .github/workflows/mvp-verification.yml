name: MVP verification

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mvp-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out immutable revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Configure Node.js 24
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Configure Go from go.mod
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: apps/scout-bee/go.mod
          cache-dependency-path: apps/scout-bee/go.mod

      - name: Install locked dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Scan tracked source for committed secret patterns
        run: pnpm security:secrets

      - name: Run complete workspace verification
        run: pnpm verify

      - name: Verify documentation, dependencies, and release evidence
        run: |
          pnpm docs:check
          pnpm audit --audit-level high
          pnpm release:verify

  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out immutable revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Validate Compose configuration
        run: docker compose --env-file docker/.env.example -f docker/compose.yaml config --quiet

      - name: Build released Compose images
        run: docker compose --env-file docker/.env.example -f docker/compose.yaml build

      - name: Install checksum-verified Grype 0.115.0
        run: |
          curl --fail --silent --show-error --location \
            --output /tmp/grype.tar.gz \
            https://github.com/anchore/grype/releases/download/v0.115.0/grype_0.115.0_linux_amd64.tar.gz
          echo "3fad92940650e514c0aa2dad83526942a055e210cec09a8a59d9c024adc2b90e  /tmp/grype.tar.gz" | sha256sum --check
          tar --extract --gzip --file /tmp/grype.tar.gz --directory /tmp grype
          /tmp/grype version

      - name: Scan Compose API image for high or critical vulnerabilities
        run: /tmp/grype apiarylens-api:0.1.0-rc.1 --fail-on high

      - name: Scan Compose web image for high or critical vulnerabilities
        run: /tmp/grype apiarylens-web:0.1.0-rc.1 --fail-on high
