name: MVP verification

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mvp-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out immutable revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Configure Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Configure Go from go.mod
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: apps/scout-bee/go.mod
          cache-dependency-path: apps/scout-bee/go.mod

      - name: Install locked dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Scan tracked source for committed secret patterns
        run: pnpm security:secrets

      - name: Run complete workspace verification
        run: pnpm verify

      - name: Verify documentation, dependencies, and release evidence
        run: |
          pnpm docs:check
          pnpm audit --audit-level high
          pnpm release:verify

  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out immutable revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Validate Compose configuration
        run: docker compose --env-file docker/.env.example -f docker/compose.yaml config --quiet

      - name: Build released Compose images
        run: docker compose --env-file docker/.env.example -f docker/compose.yaml build
