name: Product release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      exact_tag:
        description: "Existing exact product tag to release (for example v0.1.0-preview.2)"
        required: true
        type: string
      allow_unsigned_preview:
        description: "Explicitly allow an unsigned Windows Setup for this Preview run only"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  policy:
    if: github.repository == 'ApiaryLens/apiarylens'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.policy.outputs.version }}
      exact_tag: ${{ steps.policy.outputs.exact_tag }}
      channel: ${{ steps.policy.outputs.channel }}
      signing_mode: ${{ steps.policy.outputs.signing_mode }}
      explicit_unsigned_preview_opt_in: ${{ steps.policy.outputs.explicit_unsigned_preview_opt_in }}
      release_commit: ${{ steps.policy.outputs.release_commit }}
    steps:
      - name: Check out exact revision and tags
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Validate exact immutable tag and fail-closed signing policy
        id: policy
        env:
          APIARYLENS_EXACT_TAG: ${{ inputs.exact_tag || github.ref_name }}
          APIARYLENS_ALLOW_UNSIGNED_PREVIEW: ${{ inputs.allow_unsigned_preview && 'true' || 'false' }}
          # ADR 0026: Authenticode signing is performed by SignPath Foundation
          # through a submit/wait round trip in the windows job, not by locally
          # held PFX material. Signing counts as "available" only when the
          # SignPath wiring is fully configured (API token secret plus
          # organization-id repository variable). When it is not, the policy
          # script fails closed: Stable and RC releases hard-fail, and
          # Previews require the explicit allow_unsigned_preview opt-in to
          # ship labeled unsigned bytes.
          APIARYLENS_WINDOWS_SIGNING_AVAILABLE: ${{ secrets.SIGNPATH_API_TOKEN != '' && vars.SIGNPATH_ORGANIZATION_ID != '' }}
        run: |
          release_commit="$(git rev-list -n 1 "$APIARYLENS_EXACT_TAG")"
          test -n "$release_commit"
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            test "$release_commit" = "$GITHUB_SHA"
            test "$GITHUB_REF" = "refs/tags/$APIARYLENS_EXACT_TAG"
          fi
          test -z "$(git status --porcelain)"
          node scripts/product-release-policy.mjs
          echo "release_commit=$release_commit" >> "$GITHUB_OUTPUT"

  product:
    needs: policy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out exact immutable revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ needs.policy.outputs.release_commit }}

      - name: Configure Node.js 24
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Install, test, and verify source
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm security:secrets
          pnpm verify
          pnpm docs:check
          pnpm audit --audit-level high
          pnpm exec vitest run scripts/product-release-policy.test.mjs scripts/product-release-workflow.test.mjs scripts/apply-signed-windows-setup.test.mjs

      - name: Bind release inputs to the exact revision
        env:
          RELEASE_CHANNEL: ${{ needs.policy.outputs.channel }}
          RELEASE_COMMIT: ${{ needs.policy.outputs.release_commit }}
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          const path = 'release/release-manifest.json';
          const manifest = JSON.parse(readFileSync(path, 'utf8'));
          const version = JSON.parse(readFileSync('package.json', 'utf8')).version;
          manifest.productVersion = version;
          manifest.channel = process.env.RELEASE_CHANNEL;
          manifest.buildTime = new Date().toISOString();
          manifest.artifacts = [];
          if (!/^[0-9a-f]{40}$/.test(manifest.sourceCommit)) throw new Error('Release manifest requires an exact source commit.');
          writeFileSync(path, `${JSON.stringify(manifest, null, 2)}\n`);
          NODE
          source_commit="$(node -p "require('./release/release-manifest.json').sourceCommit")"
          git cat-file -e "$source_commit^{commit}"
          git merge-base --is-ancestor "$source_commit" "$RELEASE_COMMIT"

      - name: Build deployment bundles and supply-chain evidence
        run: |
          pnpm release:artifacts
          pnpm release:airgap
          pnpm release:supply-chain
          pnpm release:compatibility
          pnpm release:verify

      - name: Stage exact product subjects
        run: |
          node --input-type=module <<'NODE'
          import { cpSync, mkdirSync, readFileSync } from 'node:fs';
          import { join } from 'node:path';
          const manifest = JSON.parse(readFileSync('release/release-manifest.json', 'utf8'));
          const root = 'dist/product-release/release';
          mkdirSync(join(root, 'artifacts'), { recursive: true });
          cpSync('release/release-manifest.json', join(root, 'release-manifest.json'));
          cpSync('release/compatibility-manifest.json', join(root, 'compatibility-manifest.json'));
          for (const artifact of manifest.artifacts) {
            const source = artifact.target === 'release'
              ? join('release', artifact.name)
              : join('release', 'artifacts', artifact.name);
            const destination = artifact.target === 'release'
              ? join(root, artifact.name)
              : join(root, 'artifacts', artifact.name);
            cpSync(source, destination);
          }
          NODE

      - name: Upload exact product subjects
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: apiarylens-product-release
          path: dist/product-release/
          if-no-files-found: error

  windows:
    needs: [policy, product]
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Check out exact immutable revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ needs.policy.outputs.release_commit }}

      - name: Configure Node.js 24
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Install locked dependencies
        shell: pwsh
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Download exact product manifest and evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: apiarylens-product-release
          path: dist/product-input

      - name: Restore exact generated release inputs
        shell: pwsh
        run: Copy-Item -Path dist/product-input/release/* -Destination release -Recurse -Force

      - name: Build Windows package (unsigned; SignPath signs after packaging)
        shell: pwsh
        env:
          # Design v2 §4.3(a): the resolved signing mode is passed into the
          # package build so an unsigned Preview bakes the UNSIGNED-PREVIEW
          # label into the packaged app UI, not just the Setup filename.
          APIARYLENS_WINDOWS_SIGNING_MODE: ${{ needs.policy.outputs.signing_mode }}
        run: |
          # ADR 0026 (C1): the Squirrel package is always built unsigned here.
          # On the 'signed' policy branch the Setup bytes are signed by
          # SignPath Foundation in the round trip below, and every manifest
          # hash is recomputed from the signed bytes before finalization, so
          # windows-package.json, SHA256SUMS, and the attestations describe
          # the signed bytes. No PFX or local signing material exists in any
          # branch of this workflow.
          $env:APIARYLENS_SOURCE_COMMIT = (Get-Content -Raw release/release-manifest.json | ConvertFrom-Json).sourceCommit
          pnpm release:windows

      # ADR 0026 (C1): SignPath Foundation signing round trip for the Setup
      # executable. Runs only on the 'signed' policy branch; GV3 unsigned
      # previews never touch SignPath.
      #
      # PLACEHOLDER slugs: the SignPath organization and project do not exist
      # yet. Per ADR 0026 the GV3 labeled unsigned preview ships BEFORE the
      # SignPath application is submitted, so until the application is
      # approved leave SIGNPATH_API_TOKEN (secret) and
      # SIGNPATH_ORGANIZATION_ID (repository variable) unset: the policy job
      # then resolves signing as unavailable and Stable/RC releases fail
      # closed instead of shipping unsigned. Before the first signed run the
      # SignPath GitHub App must be installed on this repository and the slugs
      # below replaced with the real values from the approved SignPath
      # project.
      #
      # Scope note (prototyped in C1, per ADR 0026): only ApiaryLensSetup.exe
      # is signed. Squirrel's RELEASES file indexes the .nupkg (not Setup.exe),
      # so post-packaging Setup signing leaves RELEASES consistent; the
      # binaries inside the .nupkg delta/full update channel remain unsigned
      # in this iteration and are a recorded follow-up for GV4 hardening.
      - name: Upload unsigned Windows Setup for signing
        if: needs.policy.outputs.signing_mode == 'signed'
        id: unsigned-setup
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: apiarylens-windows-setup-unsigned
          path: release/artifacts/windows/artifacts/ApiaryLensSetup.exe
          if-no-files-found: error

      - name: Submit SignPath signing request and wait for signed bytes
        if: needs.policy.outputs.signing_mode == 'signed'
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd # v2.2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: apiarylens # PLACEHOLDER - real slug assigned when the SignPath application is approved (ADR 0026)
          signing-policy-slug: release-signing # PLACEHOLDER - release policy with per-release manual approval (ADR 0026)
          github-artifact-id: ${{ steps.unsigned-setup.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: release/signpath-signed

      - name: Apply signed Setup bytes and recompute manifest hashes
        if: needs.policy.outputs.signing_mode == 'signed'
        shell: pwsh
        run: |
          $signed = 'release/signpath-signed/ApiaryLensSetup.exe'
          if (-not (Test-Path -LiteralPath $signed)) { throw 'SignPath did not return ApiaryLensSetup.exe.' }
          Copy-Item -LiteralPath $signed -Destination release/artifacts/windows/artifacts/ApiaryLensSetup.exe -Force
          Remove-Item release/signpath-signed -Recurse -Force
          node scripts/apply-signed-windows-setup.mjs

      - name: Finalize visible signing evidence and exact manifests
        shell: pwsh
        env:
          APIARYLENS_EXACT_TAG: ${{ needs.policy.outputs.exact_tag }}
          APIARYLENS_WINDOWS_SIGNING_MODE: ${{ needs.policy.outputs.signing_mode }}
          APIARYLENS_EXPLICIT_UNSIGNED_PREVIEW_OPT_IN: ${{ needs.policy.outputs.explicit_unsigned_preview_opt_in }}
          APIARYLENS_RELEASE_COMMIT: ${{ needs.policy.outputs.release_commit }}
        run: |
          node scripts/finalize-windows-release.mjs
          node --input-type=module -e "import {readFileSync,writeFileSync} from 'node:fs'; const path='release/apiarylens-windows-signing.json'; const evidence=JSON.parse(readFileSync(path,'utf8')); evidence.releaseCommit=process.env.APIARYLENS_RELEASE_COMMIT; writeFileSync(path, JSON.stringify(evidence,null,2)+'\n');"
          pnpm release:compatibility

      - name: Verify Windows package signatures, hashes, and release identity
        shell: pwsh
        env:
          RELEASE_SIGNING_MODE: ${{ needs.policy.outputs.signing_mode }}
        run: |
          $root = 'release/artifacts/windows'
          $manifest = Get-Content -Raw "$root/windows-package.json" | ConvertFrom-Json
          $productManifest = Get-Content -Raw 'release/release-manifest.json' | ConvertFrom-Json
          if ($manifest.productVersion -ne '${{ needs.policy.outputs.version }}') { throw 'Windows version mismatch.' }
          if ($manifest.sourceCommit -ne $productManifest.sourceCommit) { throw 'Windows source revision mismatch.' }
          foreach ($artifact in $manifest.artifacts) {
            $path = "$root/artifacts/$($artifact.name)"
            if ((Get-Item -LiteralPath $path).Length -ne $artifact.bytes) { throw "Size mismatch: $($artifact.name)" }
            if ((Get-FileHash -Algorithm SHA256 -LiteralPath $path).Hash.ToLowerInvariant() -ne $artifact.sha256) { throw "SHA-256 mismatch: $($artifact.name)" }
          }
          $setup = Get-ChildItem "$root/artifacts/ApiaryLensSetup*.exe" -File -ErrorAction Stop
          $signature = Get-AuthenticodeSignature -LiteralPath $setup.FullName
          if ($env:RELEASE_SIGNING_MODE -eq 'signed') {
            if ($signature.Status -ne 'Valid' -or $manifest.signed -ne $true) { throw 'Signed Windows package verification failed.' }
          } else {
            if ($setup.Name -notlike '*-UNSIGNED-PREVIEW.exe' -or $signature.Status -eq 'Valid' -or $manifest.signed -ne $false) { throw 'Unsigned Preview labeling verification failed.' }
          }
          pnpm release:verify

      - name: Stage exact Windows subjects
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/windows-release/release/artifacts | Out-Null
          Copy-Item release/release-manifest.json dist/windows-release/release/
          Copy-Item release/compatibility-manifest.json dist/windows-release/release/
          Copy-Item release/apiarylens-windows-signing.json dist/windows-release/release/
          Copy-Item release/artifacts/windows dist/windows-release/release/artifacts/ -Recurse

      - name: Upload exact Windows subjects
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: apiarylens-windows-release
          path: dist/windows-release/
          if-no-files-found: error

  publish:
    needs: [policy, product, windows]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Check out exact immutable revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ needs.policy.outputs.release_commit }}

      - name: Download product subjects
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: apiarylens-product-release
          path: dist/merge

      - name: Download Windows subjects and authoritative final manifest
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: apiarylens-windows-release
          path: dist/merge

      - name: Flatten and verify every immutable release subject
        run: |
          mkdir -p dist/publish
          cp dist/merge/release/release-manifest.json dist/publish/
          cp dist/merge/release/compatibility-manifest.json dist/publish/
          cp dist/merge/release/apiarylens-*.json dist/publish/
          cp dist/merge/release/apiarylens-*.md dist/publish/
          cp dist/merge/release/apiarylens-*.jsonl dist/publish/
          cp dist/merge/release/artifacts/*.tar.gz dist/publish/
          cp dist/merge/release/artifacts/*.tar dist/publish/
          cp dist/merge/release/artifacts/windows/windows-package.json dist/publish/
          cp dist/merge/release/artifacts/windows/artifacts/* dist/publish/
          (cd dist/publish && sha256sum * > SHA256SUMS)
          node --input-type=module <<'NODE'
          import { createHash } from 'node:crypto';
          import { readFileSync, statSync } from 'node:fs';
          const manifest = JSON.parse(readFileSync('dist/publish/release-manifest.json', 'utf8'));
          const signing = JSON.parse(readFileSync('dist/publish/apiarylens-windows-signing.json', 'utf8'));
          if (manifest.productVersion !== process.env.RELEASE_VERSION || signing.sourceCommit !== manifest.sourceCommit || signing.releaseCommit !== process.env.RELEASE_COMMIT || signing.exactTag !== process.env.EXACT_TAG) throw new Error('Final release identity mismatch.');
          for (const artifact of manifest.artifacts) {
            const path = `dist/publish/${artifact.name}`;
            const hash = createHash('sha256').update(readFileSync(path)).digest('hex');
            if (statSync(path).size !== artifact.bytes || hash !== artifact.sha256) throw new Error(`Final subject mismatch: ${artifact.name}`);
          }
          NODE
        env:
          RELEASE_VERSION: ${{ needs.policy.outputs.version }}
          EXACT_TAG: ${{ needs.policy.outputs.exact_tag }}
          RELEASE_COMMIT: ${{ needs.policy.outputs.release_commit }}

      - name: Attest every published subject
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: dist/publish/*

      - name: Publish immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          EXACT_TAG: ${{ needs.policy.outputs.exact_tag }}
          VERSION: ${{ needs.policy.outputs.version }}
          SIGNING_MODE: ${{ needs.policy.outputs.signing_mode }}
        run: |
          if gh release view "$EXACT_TAG" >/dev/null 2>&1; then
            echo "Release $EXACT_TAG already exists; immutable publication refuses replacement." >&2
            exit 1
          fi
          warning=""
          if [[ "$SIGNING_MODE" == "unsigned-preview" ]]; then
            # Design v2 §4.3(d): state the SmartScreen prompt honestly and do
            # not instruct users that bypassing it is "safe".
            warning=$'## Unsigned Preview warning\n\n`ApiaryLensSetup-UNSIGNED-PREVIEW.exe` is intentionally not Authenticode signed. This exception was explicitly selected for this exact Preview run. RC and Stable releases cannot use this exception.\n\nBecause the installer is unsigned, Windows SmartScreen will warn that it is from an unknown publisher, and Microsoft Defender may flag the download. Those warnings are accurate: Windows cannot verify who published this file, and continuing past them is not safe on trust alone. Before running the installer, verify the download yourself: check its SHA-256 against `SHA256SUMS` (`Get-FileHash`) and verify the GitHub artifact attestation (`gh attestation verify`). If you have not verified the file, do not bypass the SmartScreen prompt. Preview builds are for testing with data you can afford to lose; keep current backups.'
          fi
          gh release create "$EXACT_TAG" dist/publish/* \
            --verify-tag --prerelease --latest=false --generate-notes \
            --notes "$warning" --title "ApiaryLens $VERSION"

      - name: Re-download and independently verify published bytes
        env:
          GH_TOKEN: ${{ github.token }}
          EXACT_TAG: ${{ needs.policy.outputs.exact_tag }}
        run: |
          mkdir -p dist/verified-download
          gh release download "$EXACT_TAG" --dir dist/verified-download
          (cd dist/verified-download && sha256sum --check SHA256SUMS)
          for artifact in dist/verified-download/*; do
            gh attestation verify "$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release-signing.yml" \
              --source-ref "$GITHUB_REF"
          done

  # ---------------------------------------------------------------------------
  # C2 package-manager submission jobs - DISABLED until GV4.
  # Both jobs are hard-gated with `if: false`: they cannot run on any trigger
  # until a maintainer deliberately edits this file after the owner passes the
  # GV4 stable gate (signed artifacts + conformance evidence). Stable versions
  # only; Previews and RCs are never submitted to any package manager.
  # ---------------------------------------------------------------------------

  winget-submission:
    # GV4 gate: submission to microsoft/winget-pkgs is locked until GV4.
    # Flipping `if: false` is the explicit enable switch and is an owner
    # decision recorded in the platform plan. Untested automation: this job
    # has never run; validate it on a fork before the first enabled run.
    if: ${{ false }}
    needs: [policy, publish]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out exact immutable revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ needs.policy.outputs.release_commit }}

      - name: Submit winget manifest update with komac
        env:
          # komac requires a CLASSIC personal access token with `public_repo`
          # scope on an account that owns a fork of microsoft/winget-pkgs.
          # Fine-grained PATs and GitHub App installation tokens are NOT
          # supported for komac's cross-repo PR flow (DIST-001 finding 3), so
          # this secret is a recorded exception to the GitHub-App-token rule.
          KOMAC_PAT: ${{ secrets.WINGET_SUBMISSION_PAT }}
          RELEASE_VERSION: ${{ needs.policy.outputs.version }}
          RELEASE_CHANNEL: ${{ needs.policy.outputs.channel }}
        run: |
          if [[ "$RELEASE_CHANNEL" != "stable" ]]; then
            echo "Refusing to submit $RELEASE_CHANNEL version $RELEASE_VERSION to winget." >&2
            exit 1
          fi
          curl -fsSL -o komac.deb \
            https://github.com/russellbanks/Komac/releases/download/v2.16.0/komac_2.16.0-1_amd64.deb
          sudo dpkg -i komac.deb
          # NOTE: the FIRST version of ApiaryLens.ApiaryLens must be submitted
          # as a manual PR to microsoft/winget-pkgs (see packaging/winget/);
          # komac can only update a package that already exists there.
          komac update ApiaryLens.ApiaryLens \
            --version "$RELEASE_VERSION" \
            --urls "https://github.com/ApiaryLens/apiarylens/releases/download/v${RELEASE_VERSION}/ApiaryLensSetup.exe" \
            --submit \
            --token "$KOMAC_PAT"

  chocolatey-submission:
    # GV4 gate: pushing to the Chocolatey Community Repository is locked until
    # GV4. Flipping `if: false` is the explicit enable switch and is an owner
    # decision recorded in the platform plan. First-party `choco pack` and
    # `choco push` only - chocolatey-AU is GPL-2.0 and is deliberately not
    # used (DIST-002 finding 3). Untested automation: this job has never run;
    # validate it on a fork before the first enabled run.
    if: ${{ false }}
    needs: [policy, publish]
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Check out exact immutable revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ needs.policy.outputs.release_commit }}

      - name: Pack and push Chocolatey package from published release bytes
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          RELEASE_VERSION: ${{ needs.policy.outputs.version }}
          RELEASE_CHANNEL: ${{ needs.policy.outputs.channel }}
          EXACT_TAG: ${{ needs.policy.outputs.exact_tag }}
        run: |
          if ($env:RELEASE_CHANNEL -ne 'stable') { throw "Refusing to submit $($env:RELEASE_CHANNEL) version $($env:RELEASE_VERSION) to Chocolatey." }
          New-Item -ItemType Directory -Force dist | Out-Null
          gh release download $env:EXACT_TAG --pattern SHA256SUMS --dir dist
          $line = Select-String -Path dist/SHA256SUMS -Pattern ([regex]::Escape('ApiaryLensSetup.exe')) |
            Select-Object -First 1
          if (-not $line) { throw 'Release SHA256SUMS does not list ApiaryLensSetup.exe.' }
          $sha256 = ($line.Line -split '\s+')[0]
          $staging = 'dist/choco/apiarylens'
          New-Item -ItemType Directory -Force $staging | Out-Null
          Copy-Item packaging/chocolatey/apiarylens/* $staging -Recurse -Force
          foreach ($file in @("$staging/apiarylens.nuspec", "$staging/tools/chocolateyinstall.ps1")) {
            (Get-Content -Raw $file).Replace('{VERSION}', $env:RELEASE_VERSION).Replace('{SHA256_SETUP_X64}', $sha256) |
              Set-Content -NoNewline -Path $file
          }
          choco pack "$staging/apiarylens.nuspec" --output-directory dist/choco
          $nupkg = Get-ChildItem dist/choco/*.nupkg -File -ErrorAction Stop
          choco push $nupkg.FullName --source https://push.chocolatey.org/ --api-key $env:CHOCOLATEY_API_KEY
