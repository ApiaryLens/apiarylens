name: Air-gap lifecycle verification

# OPREM-001 gap G10: prove the offline bundle installs, updates, rolls back,
# and restores on a host whose containers have no network egress. The uplink
# is dropped in the DOCKER-USER chain before any lifecycle step runs, and the
# drop counter must not grow during the whole exercise.

on:
  pull_request:
    paths:
      - docker/**
      - scripts/**
      - apps/api/**
      - packages/database/**
      - packages/contracts/**
      - release/**
      - .github/workflows/airgap-verification.yml
  push:
    branches: [main]
    paths:
      - docker/**
      - scripts/**
      - apps/api/**
      - packages/database/**
      - packages/contracts/**
      - release/**
      - .github/workflows/airgap-verification.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: airgap-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  airgap-lifecycle:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PROJECT: apiarylens-e2e
    steps:
      - name: Check out immutable revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Configure Node.js 24
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Install locked dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build the release air-gap bundle (connected side)
        run: pnpm release:airgap

      - name: Build a genuine next-version bundle for the transported update
        run: |
          version="$(node -p "require('./package.json').version")"
          next="${version}.1"
          echo "NEXT_VERSION=$next" >> "$GITHUB_ENV"
          NEXT_VERSION="$next" node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          const next = process.env.NEXT_VERSION;
          const pkg = JSON.parse(readFileSync('package.json', 'utf8'));
          pkg.version = next;
          writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          const manifest = JSON.parse(readFileSync('release/release-manifest.json', 'utf8'));
          manifest.productVersion = next;
          writeFileSync('release/release-manifest.json', `${JSON.stringify(manifest, null, 2)}\n`);
          const buildPath = 'packages/contracts/src/build.ts';
          writeFileSync(
            buildPath,
            readFileSync(buildPath, 'utf8').replace(/PRODUCT_VERSION = '[^']+'/, `PRODUCT_VERSION = '${next}'`),
          );
          NODE
          pnpm release:airgap
          mkdir -p "$RUNNER_TEMP/stash"
          cp "release/artifacts/$(ls release/artifacts | grep "^apiarylens-$next-airgap-.*\.tar$")" "$RUNNER_TEMP/stash/"
          git checkout -- package.json release/release-manifest.json packages/contracts/src/build.ts

      - name: Extract both bundles
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "BASE_VERSION=$version" >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/bundle1" "$RUNNER_TEMP/bundle2"
          tar -xf release/artifacts/apiarylens-"$version"-airgap-*.tar -C "$RUNNER_TEMP/bundle1"
          tar -xf "$RUNNER_TEMP"/stash/apiarylens-"$NEXT_VERSION"-airgap-*.tar -C "$RUNNER_TEMP/bundle2"

      # Issue #82: the post-load gate exercised further down runs against the
      # same daemon that built the images, so an image-store-specific recorded
      # ID (the containerd store reports OCI manifest/index digests that
      # `docker save` strips) still round-trips through rmi + load and matches
      # trivially here while failing on every real host. This check derives
      # the load-reproducible IDs from the saved archive bytes alone — no
      # daemon involved — so a manifest/archive identity skew fails the job
      # regardless of the runner's image store.
      - name: Validate recorded image IDs against the archive bytes (store-independent)
        run: |
          node scripts/verify-airgap-images.mjs --bundle-dir "$RUNNER_TEMP/bundle1"
          node scripts/verify-airgap-images.mjs --bundle-dir "$RUNNER_TEMP/bundle2"

      - name: Reject hostile bundle fixtures (G7)
        run: |
          cp -r "$RUNNER_TEMP/bundle1" "$RUNNER_TEMP/hostile"
          printf 'tampered' >> "$RUNNER_TEMP/hostile/release-identity.json"
          set +e
          "$RUNNER_TEMP/hostile/scripts/verify-bundle.sh" --bundle-dir "$RUNNER_TEMP/hostile"
          tampered_rc=$?
          rm "$RUNNER_TEMP/hostile/images/"apiarylens-images-*.tar
          "$RUNNER_TEMP/hostile/scripts/verify-bundle.sh" --bundle-dir "$RUNNER_TEMP/hostile"
          missing_rc=$?
          set -e
          test "$tampered_rc" -eq 65
          test "$missing_rc" -eq 65
          "$RUNNER_TEMP/bundle1/scripts/verify-bundle.sh" --bundle-dir "$RUNNER_TEMP/bundle1"

      - name: Block all container egress and record the drop counter baseline
        run: |
          uplink="$(ip route show default | awk '{print $5; exit}')"
          sudo iptables -I DOCKER-USER -o "$uplink" -j DROP
          if docker run --rm alpine:3.22 sh -c 'wget -q -T 5 -O- http://example.com' 2>/dev/null; then
            echo 'The egress block did not take effect' >&2
            exit 1
          fi
          baseline="$(sudo iptables -L DOCKER-USER -v -n -x | awk '/DROP/ {print $1; exit}')"
          echo "UPLINK=$uplink" >> "$GITHUB_ENV"
          echo "EGRESS_BASELINE=$baseline" >> "$GITHUB_ENV"
          echo "Egress blocked on $uplink; baseline dropped packets: $baseline"

      - name: Remove every locally built image so only docker load can supply them
        run: |
          docker image rm \
            "apiarylens-api:$BASE_VERSION" "apiarylens-web:$BASE_VERSION" \
            "apiarylens-api:$NEXT_VERSION" "apiarylens-web:$NEXT_VERSION" \
            alpine:3.22
          # Issue #82: `image rm` alone leaves BuildKit/containerd content
          # behind, and a later `docker load` can re-associate that cached
          # content and resurrect the build daemon's store-specific image
          # identity — the same-daemon behavior that let the defective
          # preview.4 bundle pass this job. Prune the build cache and all
          # unused image content so every load below behaves exactly like a
          # pristine host.
          docker builder prune --all --force
          docker image prune --all --force
          docker image ls

      - name: Install air-gapped from the bundle (zero egress)
        run: |
          "$RUNNER_TEMP/bundle1/scripts/install-airgap.sh" \
            --bundle-dir "$RUNNER_TEMP/bundle1" --target "$RUNNER_TEMP/apiarylens" \
            --project "$PROJECT" --site-address localhost --http-port 8080 --https-port 8443
          curl -k -fsS https://localhost:8443/health
          curl -k -fsS https://localhost:8443/health | grep -q "\"version\":\"$BASE_VERSION\""

      - name: Verified backup and non-destructive restore test (C4, G5)
        run: |
          docker run --rm --network none -v "${PROJECT}_apiarylens_data:/data" alpine:3.22 \
            sh -c 'echo transported-proof > /data/proof.txt'
          backup="$("$RUNNER_TEMP/bundle1/scripts/backup.sh" --target "$RUNNER_TEMP/apiarylens" --project "$PROJECT" | tail -n 1)"
          echo "CLEAN_BACKUP=$backup" >> "$GITHUB_ENV"
          "$RUNNER_TEMP/bundle1/scripts/restore-test.sh" --target "$RUNNER_TEMP/apiarylens" --project "$PROJECT"

      - name: Refuse a same-version transported update (G6)
        run: |
          set +e
          "$RUNNER_TEMP/bundle1/scripts/update-airgap.sh" \
            --bundle-dir "$RUNNER_TEMP/bundle1" --target "$RUNNER_TEMP/apiarylens" --project "$PROJECT"
          rc=$?
          set -e
          test "$rc" -eq 65

      - name: Transported update to the next version (runbook steps 5-12)
        run: |
          "$RUNNER_TEMP/bundle2/scripts/update-airgap.sh" \
            --bundle-dir "$RUNNER_TEMP/bundle2" --target "$RUNNER_TEMP/apiarylens" --project "$PROJECT"
          curl -k -fsS https://localhost:8443/health | grep -q "\"version\":\"$NEXT_VERSION\""
          tail -n 1 "$RUNNER_TEMP/apiarylens/lifecycle/update-ledger.jsonl" | grep -q '"outcome":"committed"'
          docker run --rm --network none -v "${PROJECT}_apiarylens_data:/data:ro" alpine:3.22 \
            sh -c 'grep -q transported-proof /data/proof.txt'

      - name: Roll back to the previous release (C4)
        run: |
          "$RUNNER_TEMP/bundle1/scripts/rollback.sh" --target "$RUNNER_TEMP/apiarylens" --project "$PROJECT"
          curl -k -fsS https://localhost:8443/health | grep -q "\"version\":\"$BASE_VERSION\""
          tail -n 1 "$RUNNER_TEMP/apiarylens/lifecycle/update-ledger.jsonl" | grep -q '"outcome":"rolled-back"'

      - name: One-shot migration rejects a tampered ledger under --network none (G3)
        run: |
          docker run --rm --network none -v "${PROJECT}_apiarylens_data:/data" "apiarylens-api:$BASE_VERSION" node -e '
            const { DatabaseSync } = require("node:sqlite");
            const db = new DatabaseSync("/data/apiarylens.sqlite");
            db.prepare("UPDATE migrations SET checksum = ? WHERE version = ?").run("0".repeat(64), "0004");
            db.close();
          '
          set +e
          output="$(docker run --rm --network none \
            -v "${PROJECT}_apiarylens_data:/data" -e APIARYLENS_DATABASE=/data/apiarylens.sqlite \
            "apiarylens-api:$BASE_VERSION" node dist/migrate.js)"
          rc=$?
          set -e
          echo "$output"
          test "$rc" -ne 0
          echo "$output" | grep -q migration_checksum_mismatch

      - name: A transported update over corrupted state fails closed
        run: |
          set +e
          "$RUNNER_TEMP/bundle2/scripts/update-airgap.sh" \
            --bundle-dir "$RUNNER_TEMP/bundle2" --target "$RUNNER_TEMP/apiarylens" --project "$PROJECT"
          rc=$?
          set -e
          test "$rc" -ne 0
          if tail -n 1 "$RUNNER_TEMP/apiarylens/lifecycle/update-ledger.jsonl" | grep -q '"outcome":"committed"'; then
            echo 'A corrupted deployment must never commit an update' >&2
            exit 1
          fi

      - name: Restore the verified clean backup and recover (C4)
        run: |
          "$RUNNER_TEMP/bundle1/scripts/restore.sh" --target "$RUNNER_TEMP/apiarylens" \
            --project "$PROJECT" --backup "$CLEAN_BACKUP" --yes
          curl -k -fsS https://localhost:8443/health | grep -q "\"version\":\"$BASE_VERSION\""
          docker run --rm --network none -v "${PROJECT}_apiarylens_data:/data:ro" alpine:3.22 \
            sh -c 'grep -q transported-proof /data/proof.txt'

      - name: Update cleanly after recovery
        run: |
          "$RUNNER_TEMP/bundle2/scripts/update-airgap.sh" \
            --bundle-dir "$RUNNER_TEMP/bundle2" --target "$RUNNER_TEMP/apiarylens" --project "$PROJECT"
          curl -k -fsS https://localhost:8443/health | grep -q "\"version\":\"$NEXT_VERSION\""

      - name: Assert zero egress attempts across the whole lifecycle (G10)
        run: |
          counter="$(sudo iptables -L DOCKER-USER -v -n -x | awk '/DROP/ {print $1; exit}')"
          echo "Dropped packets: baseline $EGRESS_BASELINE, final $counter"
          sudo iptables -L DOCKER-USER -v -n -x
          test "$counter" -eq "$EGRESS_BASELINE"

      - name: Teardown keeps data by default, deletes only with typed consent
        run: |
          "$RUNNER_TEMP/bundle1/scripts/teardown.sh" --target "$RUNNER_TEMP/apiarylens" --project "$PROJECT"
          docker volume inspect "${PROJECT}_apiarylens_data" >/dev/null
          "$RUNNER_TEMP/bundle1/scripts/teardown.sh" --target "$RUNNER_TEMP/apiarylens" \
            --project "$PROJECT" --delete-data --yes-delete-my-data
          if docker volume inspect "${PROJECT}_apiarylens_data" >/dev/null 2>&1; then
            echo 'The data volume must be removed after confirmed permanent removal' >&2
            exit 1
          fi
          test ! -e "$RUNNER_TEMP/apiarylens"

      # Issue #91: the lifecycle above ran on the runner's default image
      # store (classic graphdriver on GitHub runners), where a loaded image's
      # .Id is the config-blob digest. Real hosts on current Docker Engine
      # default to the containerd image store, where .Id is the OCI manifest
      # digest — the identity form that made the shipped preview.5 gate
      # refuse its own bundle while this job stayed green. Re-exercise the
      # load + post-load gate + install path under the containerd store so a
      # store-dependent gate regression can never pass CI again.
      - name: Switch the daemon to the containerd image store (current Docker default)
        run: |
          echo '{"features":{"containerd-snapshotter":true}}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          docker info --format '{{.DriverStatus}} driver={{.Driver}}'
          test "$(docker info --format '{{.Driver}}')" = 'overlayfs'

      - name: Prune all image content so only docker load can supply images (containerd store)
        run: |
          docker builder prune --all --force
          docker image prune --all --force
          docker image ls

      - name: Post-load gate accepts the bundle's own images under the containerd store (#91)
        run: |
          "$RUNNER_TEMP/bundle1/scripts/load-images.sh" --bundle-dir "$RUNNER_TEMP/bundle1"
          "$RUNNER_TEMP/bundle2/scripts/load-images.sh" --bundle-dir "$RUNNER_TEMP/bundle2"
          # Prove this leg is exercising the containerd identity form, not
          # silently repeating the classic-store comparison: under the
          # containerd store the loaded .Id must be the recorded OCI manifest
          # digest, not the recorded config digest.
          api_image="$(sed -n 's/^ *"apiImage": "\(.*\)",$/\1/p' "$RUNNER_TEMP/bundle1/bundle-manifest.json")"
          config_id="$(sed -n 's/^ *"apiImageId": "\(.*\)",$/\1/p' "$RUNNER_TEMP/bundle1/bundle-manifest.json")"
          manifest_digest="$(sed -n 's/^ *"apiImageManifestDigest": "\(.*\)",$/\1/p' "$RUNNER_TEMP/bundle1/bundle-manifest.json")"
          loaded_id="$(docker image inspect --format '{{.Id}}' "$api_image")"
          echo "containerd store loaded .Id: $loaded_id (config $config_id, manifest $manifest_digest)"
          test "$loaded_id" = "$manifest_digest"
          test "$loaded_id" != "$config_id"

      - name: Install air-gapped from the bundle under the containerd store (zero egress)
        run: |
          "$RUNNER_TEMP/bundle1/scripts/install-airgap.sh" \
            --bundle-dir "$RUNNER_TEMP/bundle1" --target "$RUNNER_TEMP/apiarylens-ctrd" \
            --project "$PROJECT-ctrd" --site-address localhost --http-port 8081 --https-port 8444
          curl -k -fsS https://localhost:8444/health | grep -q "\"version\":\"$BASE_VERSION\""
          counter="$(sudo iptables -L DOCKER-USER -v -n -x | awk '/DROP/ {print $1; exit}')"
          echo "Dropped packets after containerd-store install: baseline $EGRESS_BASELINE, now $counter"
          test "$counter" -eq "$EGRESS_BASELINE"

      - name: Teardown the containerd-store deployment
        run: |
          "$RUNNER_TEMP/bundle1/scripts/teardown.sh" --target "$RUNNER_TEMP/apiarylens-ctrd" \
            --project "$PROJECT-ctrd" --delete-data --yes-delete-my-data

      - name: Diagnostics on failure
        if: failure()
        run: |
          docker ps -a || true
          docker compose -p "$PROJECT" -f "$RUNNER_TEMP/apiarylens/current/docker/compose.yaml" logs --tail 100 || true
          cat "$RUNNER_TEMP/apiarylens/lifecycle/update-ledger.jsonl" || true
          sudo iptables -L DOCKER-USER -v -n -x || true
