name: WIN-003 Windows host research

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tauri-node-sidecar:
    name: Tauri and packaged Node sidecar evidence
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Node 24
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable

      - name: Install repository dependencies
        run: pnpm install --frozen-lockfile

      - name: Build current React client
        run: pnpm --filter @apiarylens/web... build

      - name: Run isolated Tauri research build and measurements
        shell: pwsh
        run: >-
          ./scripts/research/Invoke-Win003TauriSpike.ps1
          -WebDist ./apps/web/dist
          -IconPath ./apps/web/public/icons/apiarylens-512.png
          -OutputDirectory "$env:RUNNER_TEMP/win003-evidence"

      - name: Upload measurement evidence
        uses: actions/upload-artifact@v4
        with:
          name: win003-tauri-node-sidecar-evidence
          path: ${{ runner.temp }}/win003-evidence
          if-no-files-found: error
          retention-days: 14

  clean-install-lifecycle:
    name: Clean install and uninstall evidence
    needs: tauri-node-sidecar
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out research automation
        uses: actions/checkout@v5

      - name: Download exact research artifact
        uses: actions/download-artifact@v4
        with:
          name: win003-tauri-node-sidecar-evidence
          path: ${{ runner.temp }}/win003-input

      - name: Run clean-profile lifecycle probe
        shell: pwsh
        run: >-
          ./scripts/research/Invoke-Win003TauriInstallProbe.ps1
          -EvidenceDirectory "$env:RUNNER_TEMP/win003-input"
          -OutputDirectory "$env:RUNNER_TEMP/win003-lifecycle"

      - name: Upload lifecycle evidence
        uses: actions/upload-artifact@v4
        with:
          name: win003-tauri-clean-install-evidence
          path: ${{ runner.temp }}/win003-lifecycle
          if-no-files-found: error
          retention-days: 14
