name: WIN-005 Windows credential protection research

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  credential-protection:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - name: Exercise Credential Manager and current-user DPAPI
        shell: pwsh
        run: >-
          ./scripts/research/Invoke-Win005CredentialProtectionSpike.ps1
          -OutputDirectory "$env:RUNNER_TEMP/win005-credential-protection-evidence"
          -TestDifferentUser
      - name: Upload sanitized credential evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: win005-credential-protection-evidence
          path: ${{ runner.temp }}/win005-credential-protection-evidence
          if-no-files-found: warn
          retention-days: 14

  dpapi-export:
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - name: Create synthetic current-user DPAPI fixture
        shell: pwsh
        run: >-
          ./scripts/research/Invoke-Win005DpapiExportProbe.ps1
          -OutputDirectory "$env:RUNNER_TEMP/win005-dpapi-cross-machine-fixture"
      - name: Transfer protected synthetic fixture to a separate Windows job
        uses: actions/upload-artifact@v4
        with:
          name: win005-dpapi-cross-machine-fixture
          path: ${{ runner.temp }}/win005-dpapi-cross-machine-fixture
          if-no-files-found: error
          retention-days: 1

  dpapi-import:
    needs: dpapi-export
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - name: Receive protected synthetic fixture
        uses: actions/download-artifact@v5
        with:
          name: win005-dpapi-cross-machine-fixture
          path: ${{ runner.temp }}/win005-dpapi-cross-machine-fixture
      - name: Prove current-user DPAPI rejects a different Windows computer
        shell: pwsh
        run: >-
          ./scripts/research/Invoke-Win005DpapiImportProbe.ps1
          -FixtureDirectory "$env:RUNNER_TEMP/win005-dpapi-cross-machine-fixture"
          -OutputDirectory "$env:RUNNER_TEMP/win005-dpapi-cross-machine-evidence"
      - name: Upload sanitized cross-computer evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: win005-dpapi-cross-machine-evidence
          path: ${{ runner.temp }}/win005-dpapi-cross-machine-evidence
          if-no-files-found: warn
          retention-days: 14
