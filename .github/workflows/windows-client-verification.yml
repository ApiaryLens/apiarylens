name: Windows client verification

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/windows/**"
      - "apps/web/**"
      - "apps/api/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "scripts/build-windows-package.mjs"
      - ".github/workflows/windows-client-verification.yml"
  pull_request:
    paths:
      - "apps/windows/**"
      - "apps/web/**"
      - "apps/api/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "scripts/build-windows-package.mjs"
      - ".github/workflows/windows-client-verification.yml"

permissions:
  contents: read

concurrency:
  group: windows-client-${{ github.ref }}
  cancel-in-progress: true

jobs:
  exact-host:
    name: Exact Windows host
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Check out immutable revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Configure Node.js 24
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Install locked dependencies
        shell: pwsh
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build and test production Windows composition
        shell: pwsh
        run: |
          pnpm --filter @apiarylens/windows typecheck
          pnpm --filter @apiarylens/windows test
          pnpm --filter @apiarylens/windows build

      - name: Run hidden exact-host smoke
        shell: pwsh
        run: |
          $evidence = "${{ runner.temp }}/apiarylens-windows-evidence.json"
          $profile = "${{ runner.temp }}/apiarylens-windows-profile"
          $process = Start-Process -FilePath "pnpm.cmd" -ArgumentList @(
            "--filter", "@apiarylens/windows", "start", "--",
            "--desktop-user-data=$profile",
            "--desktop-smoke=$evidence"
          ) -PassThru -WindowStyle Hidden
          try {
            $deadline = (Get-Date).AddSeconds(30)
            while (-not (Test-Path -LiteralPath $evidence)) {
              if ($process.HasExited) {
                throw "Windows host exited before writing exact-host evidence ($($process.ExitCode))."
              }
              if ((Get-Date) -ge $deadline) {
                throw "Windows host did not write exact-host evidence within 30 seconds."
              }
              Start-Sleep -Milliseconds 200
            }
          }
          finally {
            $all = @(Get-CimInstance Win32_Process)
            $tree = [System.Collections.Generic.List[int]]::new()
            $tree.Add($process.Id)
            for ($index = 0; $index -lt $tree.Count; $index++) {
              foreach ($child in $all | Where-Object ParentProcessId -eq $tree[$index]) {
                if (-not $tree.Contains([int]$child.ProcessId)) {
                  $tree.Add([int]$child.ProcessId)
                }
              }
            }
            for ($index = $tree.Count - 1; $index -ge 0; $index--) {
              Stop-Process -Id $tree[$index] -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Verify secret-free security evidence
        shell: pwsh
        run: |
          $evidence = Get-Content -Raw "${{ runner.temp }}/apiarylens-windows-evidence.json" | ConvertFrom-Json
          foreach ($property in @(
            'loopbackOnly',
            'unauthorizedRequestRejected',
            'authenticatedHealthPassed',
            'productShellServed',
            'sandboxedRenderer'
          )) {
            if ($evidence.$property -ne $true) { throw "Windows evidence failed: $property" }
          }
          if ($evidence.controlTokenExposedInRenderer -ne $false) {
            throw 'The local service control token was exposed to renderer JavaScript.'
          }
          $expectedBridge = @(
            'runtimeStatus',
            'bootstrapOwner',
            'createStandaloneBackup',
            'restoreStandaloneBackup',
            'migrateStandaloneToConnected'
          )
          if (Compare-Object $expectedBridge @($evidence.bridgeKeys)) {
            throw 'The preload bridge differs from the approved minimal surface.'
          }
          if ($evidence.serviceProtocolVersion -ne 1) {
            throw 'The embedded service protocol is incompatible.'
          }

      - name: Upload sanitized Windows evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: windows-client-security-evidence
          path: ${{ runner.temp }}/apiarylens-windows-evidence.json
          if-no-files-found: error
          retention-days: 14

      - name: Build current-user installer and update artifacts
        shell: pwsh
        run: node scripts/build-windows-package.mjs

      - name: Verify package manifest and hidden packaged host
        shell: pwsh
        run: |
          $release = "${{ github.workspace }}/.artifacts/windows-release"
          $manifest = Get-Content -Raw "$release/windows-package.json" | ConvertFrom-Json
          $expectedVersion = (Get-Content -Raw "${{ github.workspace }}/package.json" | ConvertFrom-Json).version
          if ($manifest.productVersion -ne $expectedVersion) { throw "Unexpected Windows package version: $($manifest.productVersion), expected $expectedVersion." }
          if ($manifest.packageKind -ne 'squirrel-current-user') { throw 'Unexpected package kind.' }
          if ($manifest.signed -ne $false) { throw 'Ordinary verification must not claim production signing.' }
          foreach ($artifact in $manifest.artifacts) {
            $path = "$release/artifacts/$($artifact.name)"
            if (-not (Test-Path -LiteralPath $path)) { throw "Missing package artifact $($artifact.name)" }
            if ((Get-Item -LiteralPath $path).Length -ne $artifact.bytes) { throw "Size mismatch for $($artifact.name)" }
            if ((Get-FileHash -Algorithm SHA256 -LiteralPath $path).Hash.ToLowerInvariant() -ne $artifact.sha256) {
              throw "SHA-256 mismatch for $($artifact.name)"
            }
          }
          $required = @('ApiaryLensSetup.exe', 'RELEASES')
          foreach ($name in $required) {
            if ($name -notin @($manifest.artifacts.name)) { throw "Manifest omits $name" }
          }

          $appDirectory = Get-ChildItem "$release/packaged" -Directory | Select-Object -First 1
          $executable = Join-Path $appDirectory.FullName 'ApiaryLens.exe'
          $evidence = "${{ runner.temp }}/apiarylens-packaged-evidence.json"
          $profile = "${{ runner.temp }}/apiarylens-packaged-profile"
          $process = Start-Process -FilePath $executable -ArgumentList @(
            "--desktop-user-data=$profile",
            "--desktop-smoke=$evidence"
          ) -PassThru -WindowStyle Hidden
          try {
            $deadline = (Get-Date).AddSeconds(40)
            while (-not (Test-Path -LiteralPath $evidence)) {
              if ($process.HasExited) { throw "Packaged host exited early ($($process.ExitCode))." }
              if ((Get-Date) -ge $deadline) { throw 'Packaged host smoke timed out.' }
              Start-Sleep -Milliseconds 200
            }
            $result = Get-Content -Raw $evidence | ConvertFrom-Json
            foreach ($property in @('loopbackOnly', 'unauthorizedRequestRejected', 'authenticatedHealthPassed', 'productShellServed', 'sandboxedRenderer')) {
              if ($result.$property -ne $true) { throw "Packaged host evidence failed: $property" }
            }
            if ($result.controlTokenExposedInRenderer -ne $false) { throw 'Packaged renderer exposed the control token.' }
          }
          finally {
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Upload Windows package verification artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: windows-preview-package-verification
          path: |
            .artifacts/windows-release/artifacts/
            .artifacts/windows-release/windows-package.json
            ${{ runner.temp }}/apiarylens-packaged-evidence.json
          if-no-files-found: error
          retention-days: 14

      - name: Verify current-user install, launch, keep-data uninstall
        shell: pwsh
        run: |
          $release = "${{ github.workspace }}/.artifacts/windows-release"
          $setup = "$release/artifacts/ApiaryLensSetup.exe"
          $install = Start-Process -FilePath $setup -ArgumentList '--silent' -PassThru -WindowStyle Hidden
          if (-not $install.WaitForExit(90000)) {
            Stop-Process -Id $install.Id -Force -ErrorAction SilentlyContinue
            throw 'ApiaryLens Setup exceeded 90 seconds.'
          }
          if ($install.ExitCode -ne 0) { throw "ApiaryLens Setup failed with exit code $($install.ExitCode)." }

          $installRoot = Join-Path $env:LOCALAPPDATA 'ApiaryLens'
          $deadline = (Get-Date).AddSeconds(30)
          while (-not (Test-Path -LiteralPath (Join-Path $installRoot 'Update.exe'))) {
            if ((Get-Date) -ge $deadline) { throw 'Squirrel install root was not created.' }
            Start-Sleep -Milliseconds 250
          }
          Get-Process ApiaryLens -ErrorAction SilentlyContinue |
            Where-Object { $_.Path -and $_.Path.StartsWith($installRoot, [StringComparison]::OrdinalIgnoreCase) } |
            Stop-Process -Force -ErrorAction SilentlyContinue

          $appDirectory = Get-ChildItem $installRoot -Directory -Filter 'app-*' |
            Sort-Object Name -Descending | Select-Object -First 1
          $installedHost = Join-Path $appDirectory.FullName 'ApiaryLens.exe'
          if (-not (Test-Path -LiteralPath $installedHost)) { throw 'Installed ApiaryLens host was not found.' }
          $profile = "${{ runner.temp }}/apiarylens-installed-profile"
          $evidence = "${{ runner.temp }}/apiarylens-installed-evidence.json"
          $installedProcess = Start-Process -FilePath $installedHost -ArgumentList @(
            "--desktop-user-data=$profile",
            "--desktop-smoke=$evidence"
          ) -PassThru -WindowStyle Hidden
          try {
            $deadline = (Get-Date).AddSeconds(40)
            while (-not (Test-Path -LiteralPath $evidence)) {
              if ($installedProcess.HasExited) { throw "Installed host exited early ($($installedProcess.ExitCode))." }
              if ((Get-Date) -ge $deadline) { throw 'Installed host smoke timed out.' }
              Start-Sleep -Milliseconds 200
            }
          }
          finally {
            Stop-Process -Id $installedProcess.Id -Force -ErrorAction SilentlyContinue
          }

          $update = Join-Path $installRoot 'Update.exe'
          $uninstall = Start-Process -FilePath $update -ArgumentList @('--uninstall', '--silent') -PassThru -WindowStyle Hidden
          if (-not $uninstall.WaitForExit(90000)) {
            Stop-Process -Id $uninstall.Id -Force -ErrorAction SilentlyContinue
            throw 'ApiaryLens uninstall exceeded 90 seconds.'
          }
          if ($uninstall.ExitCode -ne 0) { throw "ApiaryLens uninstall failed with exit code $($uninstall.ExitCode)." }
          if (Test-Path -LiteralPath $installedHost) { throw 'Installed host remained after uninstall.' }
          if (-not (Test-Path -LiteralPath $profile)) { throw 'Keep-data uninstall removed the user data root.' }
